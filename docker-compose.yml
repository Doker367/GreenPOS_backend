version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: greenpos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-greenpos123}
      POSTGRES_DB: greenpos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenpos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://greenpos:${DB_PASSWORD:-greenpos123}@postgres:5432/greenpos?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ENV: ${ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
