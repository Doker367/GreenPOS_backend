version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: greenpos-postgres
    environment:
      POSTGRES_USER: greenpos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-greenpos123}
      POSTGRES_DB: greenpos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./internal/repository/migrations:/docker-entrypoint-initdb.d/migrations:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenpos -d greenpos"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - greenpos-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greenpos-api
    environment:
      PORT: 8080
      DATABASE_URL: postgres://greenpos:${DB_PASSWORD:-greenpos123}@postgres:5432/greenpos?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-$(shell date +%s)}
      ENV: ${ENV:-development}
      DB_MAX_OPEN_CONNS: "25"
      DB_MAX_IDLE_CONNS: "5"
      DB_CONN_MAX_LIFETIME: "300"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      RATE_LIMIT_REQUESTS: "100"
      TAX_RATE: "0.16"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - greenpos-network

  # Optional: Adminer for database management
  adminer:
    image: adminer:4.8.1
    container_name: greenpos-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - greenpos-network
    profiles:
      - debug

volumes:
  postgres_data:
    driver: local

networks:
  greenpos-network:
    driver: bridge
