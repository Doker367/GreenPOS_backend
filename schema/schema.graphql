scalar UUID
scalar Time
scalar Date
scalar JSON

type Tenant {
  id: UUID!
  name: String!
  slug: String!
  settings: JSON
  isActive: Boolean!
  branches: [Branch!]!
  createdAt: Time!
  updatedAt: Time!
}

type Branch {
  id: UUID!
  tenant: Tenant!
  name: String!
  address: String
  phone: String
  isActive: Boolean!
  users: [User!]!
  categories: [Category!]!
  products: [Product!]!
  tables: [Table!]!
  orders: [Order!]!
  reservations: [Reservation!]!
  createdAt: Time!
  updatedAt: Time!
}

type User {
  id: UUID!
  branch: Branch!
  email: String!
  name: String!
  role: UserRole!
  isActive: Boolean!
  createdAt: Time!
  updatedAt: Time!
}

enum UserRole {
  OWNER
  ADMIN
  MANAGER
  WAITER
  KITCHEN
}

type Category {
  id: UUID!
  branch: Branch!
  name: String!
  description: String
  sortOrder: Int!
  isActive: Boolean!
  products: [Product!]!
  createdAt: Time!
  updatedAt: Time!
}

type Product {
  id: UUID!
  branch: Branch!
  category: Category
  name: String!
  description: String
  price: Float!
  imageUrl: String
  isAvailable: Boolean!
  isFeatured: Boolean!
  preparationTime: Int!
  allergens: [String!]!
  rating: Float!
  reviewCount: Int!
  createdAt: Time!
  updatedAt: Time!
}

type Table {
  id: UUID!
  branch: Branch!
  number: String!
  capacity: Int!
  status: TableStatus!
  currentOrder: Order
  createdAt: Time!
  updatedAt: Time!
}

enum TableStatus {
  AVAILABLE
  OCCUPIED
  RESERVED
}

type Order {
  id: UUID!
  branch: Branch!
  table: Table
  user: User!
  customerName: String
  customerPhone: String
  status: OrderStatus!
  subtotal: Float!
  tax: Float!
  discount: Float!
  total: Float!
  notes: String
  items: [OrderItem!]!
  createdAt: Time!
  updatedAt: Time!
}

enum OrderStatus {
  PENDING
  ACCEPTED
  PREPARING
  READY
  DELIVERED
  CANCELLED
  PAID
}

type OrderItem {
  id: UUID!
  order: Order!
  product: Product!
  quantity: Int!
  unitPrice: Float!
  totalPrice: Float!
  notes: String
  createdAt: Time!
}

type Reservation {
  id: UUID!
  branch: Branch!
  table: Table
  customerName: String!
  customerPhone: String
  customerEmail: String
  guestCount: Int!
  reservationDate: Date!
  reservationTime: Time!
  status: ReservationStatus!
  notes: String
  createdAt: Time!
  updatedAt: Time!
}

enum ReservationStatus {
  PENDING
  CONFIRMED
  CANCELLED
  COMPLETED
}

# ============ INVENTORY TYPES ============

type InventoryItem {
  id: UUID!
  branchId: UUID!
  name: String!
  unit: String!
  currentStock: Float!
  minStock: Float!
  cost: Float!
  isActive: Boolean!
  movements(limit: Int): [InventoryMovement!]!
  createdAt: Time!
  updatedAt: Time!
}

type InventoryMovement {
  id: UUID!
  inventoryItemId: UUID!
  type: MovementType!
  quantity: Float!
  reason: String
  userId: UUID
  createdAt: Time!
}

enum MovementType {
  IN
  OUT
  ADJUSTMENT
}

# Inputs for inventory mutations
input CreateInventoryItemInput {
  branchId: UUID!
  name: String!
  unit: String!
  currentStock: Float
  minStock: Float
  cost: Float
}

input UpdateInventoryItemInput {
  name: String
  unit: String
  minStock: Float
  cost: Float
  isActive: Boolean
}

input AddInventoryInput {
  itemId: UUID!
  quantity: Float!
  reason: String
}

input RemoveInventoryInput {
  itemId: UUID!
  quantity: Float!
  reason: String
}

input AdjustInventoryInput {
  itemId: UUID!
  newStock: Float!
  reason: String
}

# Inputs
input CreateTenantInput {
  name: String!
  slug: String!
  settings: JSON
}

input CreateBranchInput {
  tenantId: UUID!
  name: String!
  address: String
  phone: String
}

input CreateUserInput {
  branchId: UUID!
  email: String!
  password: String!
  name: String!
  role: UserRole!
}

input CreateCategoryInput {
  branchId: UUID!
  name: String!
  description: String
  sortOrder: Int
}

input CreateProductInput {
  branchId: UUID!
  categoryId: UUID
  name: String!
  description: String
  price: Float!
  imageUrl: String
  isAvailable: Boolean
  isFeatured: Boolean
  preparationTime: Int
  allergens: [String!]
}

input CreateTableInput {
  branchId: UUID!
  number: String!
  capacity: Int
}

input CreateOrderInput {
  branchId: UUID!
  tableId: UUID
  userId: UUID!
  customerName: String
  customerPhone: String
  notes: String
  items: [CreateOrderItemInput!]!
}

input CreateOrderItemInput {
  productId: UUID!
  quantity: Int!
  notes: String
}

input CreateReservationInput {
  branchId: UUID!
  tableId: UUID
  customerName: String!
  customerPhone: String
  customerEmail: String
  guestCount: Int!
  reservationDate: Date!
  reservationTime: Time!
  notes: String
}

# Auth
type AuthPayload {
  token: String!
  user: User!
}

# Queries
type Query {
  # Tenant queries
  me: User!
  tenant: Tenant!
  
  # Branch queries
  branches: [Branch!]!
  branch(id: UUID!): Branch
  
  # User queries
  users(branchId: UUID!): [User!]!
  user(id: UUID!): User
  
  # Category queries
  categories(branchId: UUID!): [Category!]!
  category(id: UUID!): Category
  
  # Product queries
  products(branchId: UUID!, categoryId: UUID): [Product!]!
  product(id: UUID!): Product
  featuredProducts(branchId: UUID!): [Product!]!
  
  # Table queries
  tables(branchId: UUID!): [Table!]!
  table(id: UUID!): Table
  
  # Order queries
  orders(branchId: UUID!, status: OrderStatus, limit: Int): [Order!]!
  order(id: UUID!): Order
  activeOrders(branchId: UUID!): [Order!]!
  kitchenOrders(branchId: UUID!): [Order!]!
  
  # Reservation queries
  reservations(branchId: UUID!, date: Date): [Reservation!]!
  reservation(id: UUID!): Reservation

  # Inventory queries
  inventoryItems(branchId: UUID!): [InventoryItem!]!
  inventoryItem(id: UUID!): InventoryItem
  lowStockItems(branchId: UUID!): [InventoryItem!]!
  inventoryMovements(itemId: UUID!, limit: Int): [InventoryMovement!]!

  # Invoice queries
  invoices(branchId: UUID!, status: InvoiceStatus, startDate: Date, endDate: Date): [Invoice!]!
  invoice(id: UUID!): Invoice
  tenantFiscal: TenantFiscal

  # Analytics queries
  dashboardMetrics(branchId: UUID!, period: String!): DashboardMetrics!
  topProducts(branchId: UUID!, limit: Int, period: String): [TopProduct!]!
  salesByDay(branchId: UUID!, days: Int!): [DailySales!]!
  ordersByStatus(branchId: UUID!): [StatusCount!]!
  revenueByPeriod(branchId: UUID!, period: String!): RevenueReport!
}

# Analytics Types
type DashboardMetrics {
  totalOrders: Int!
  totalRevenue: Float!
  averageTicket: Float!
  ordersToday: Int!
  revenueToday: Float!
  ordersThisWeek: Int!
  revenueThisWeek: Float!
  topProducts: [TopProduct!]!
}

type TopProduct {
  productId: String!
  productName: String!
  quantitySold: Int!
  revenue: Float!
}

type DailySales {
  date: String!
  orders: Int!
  revenue: Float!
}

type StatusCount {
  status: String!
  count: Int!
}

type RevenueReport {
  period: String!
  totalRevenue: Float!
  totalOrders: Int!
  averageTicket: Float!
  byPaymentMethod: [PaymentMethodRevenue!]!
}

type PaymentMethodRevenue {
  method: String!
  revenue: Float!
  count: Int!
}

# ===== INVOICE TYPES =====

type Invoice {
  id: UUID!
  branchId: UUID!
  orderId: UUID!
  serie: String!
  folio: Int!
  uuid: String
  status: InvoiceStatus!

  # Emisor
  emisorRfc: String!
  emisorNombre: String!
  emisorRegimen: String!

  # Receptor
  receptorRfc: String!
  receptorNombre: String!
  receptorUsoCfdi: String!
  receptorDomicilio: String

  # Totales
  subtotal: Float!
  descuento: Float!
  impuestosTrasladados: Float!
  total: Float!
  iva16Amount: Float!
  iepsAmount: Float

  # Archivos
  pdfUrl: String
  xmlUrl: String

  # Items
  items: [InvoiceItem!]!

  createdAt: Time!
}

type InvoiceItem {
  id: UUID!
  productName: String!
  claveProdServ: String!
  claveUnidad: String!
  quantity: Int!
  unitPrice: Float!
  discount: Float!
  taxRate: Float!
  taxAmount: Float!
  total: Float!
}

enum InvoiceStatus {
  DRAFT
  PENDING
  TIMBRADA
  CANCELLED
}

type TenantFiscal {
  id: UUID!
  rfc: String!
  razonSocial: String!
  regimenFiscal: String!
  calle: String
  numero: String
  colonia: String
  cp: String
  ciudad: String
  estado: String
  pais: String
}

# ===== INVOICE INPUTS =====

input CreateInvoiceInput {
  orderId: UUID!
  receptorRfc: String!
  receptorNombre: String!
  receptorUsoCfdi: String!
  receptorDomicilio: String
  formaPago: String!
  metodoPago: String!
  serie: String
  descuento: Float
  items: [CreateInvoiceItemInput!]!
}

input CreateInvoiceItemInput {
  productId: UUID!
  quantity: Int!
  claveProdServ: String!
  claveUnidad: String!
  discount: Float
}

input UpdateTenantFiscalInput {
  rfc: String
  razonSocial: String
  regimenFiscal: String
  calle: String
  numero: String
  colonia: String
  cp: String
  ciudad: String
  estado: String
  pais: String
}

# Mutations
type Mutation {
  # Auth
  login(email: String!, password: String!, branchId: UUID!): AuthPayload!
  
  # Tenant
  createTenant(input: CreateTenantInput!): Tenant!
  updateTenant(id: UUID!, name: String, settings: JSON): Tenant!
  
  # Branch
  createBranch(input: CreateBranchInput!): Branch!
  updateBranch(id: UUID!, name: String, address: String, phone: String): Branch!
  
  # User
  createUser(input: CreateUserInput!): User!
  updateUser(id: UUID!, name: String, role: UserRole, isActive: Boolean): User!
  deleteUser(id: UUID!): Boolean!
  
  # Category
  createCategory(input: CreateCategoryInput!): Category!
  updateCategory(id: UUID!, name: String, description: String, sortOrder: Int, isActive: Boolean): Category!
  deleteCategory(id: UUID!): Boolean!
  reorderCategories(branchId: UUID!, categoryIds: [UUID!]!): [Category!]!
  
  # Product
  createProduct(input: CreateProductInput!): Product!
  updateProduct(id: UUID!, input: CreateProductInput!): Product!
  deleteProduct(id: UUID!): Boolean!
  toggleProductAvailability(id: UUID!): Product!
  
  # Table
  createTable(input: CreateTableInput!): Table!
  updateTable(id: UUID!, number: String, capacity: Int): Table!
  deleteTable(id: UUID!): Boolean!
  updateTableStatus(id: UUID!, status: TableStatus!): Table!
  
  # Order
  createOrder(input: CreateOrderInput!): Order!
  updateOrderStatus(id: UUID!, status: OrderStatus!): Order!
  cancelOrder(id: UUID!): Order!
  addOrderItem(orderId: UUID!, input: CreateOrderItemInput!): OrderItem!
  removeOrderItem(id: UUID!): Boolean!
  markOrderReady(id: UUID!): Order!
  
  # Reservation
  createReservation(input: CreateReservationInput!): Reservation!
  updateReservation(id: UUID!, input: CreateReservationInput!): Reservation!
  cancelReservation(id: UUID!): Reservation!

  # Invoice
  createInvoice(input: CreateInvoiceInput!): Invoice!
  stampInvoice(id: UUID!): Invoice!
  cancelInvoice(id: UUID!, motivo: String!): Invoice!
  updateTenantFiscal(input: UpdateTenantFiscalInput!): TenantFiscal!
  createTenantFiscal(input: UpdateTenantFiscalInput!): TenantFiscal!

  # Inventory mutations
  createInventoryItem(input: CreateInventoryItemInput!): InventoryItem!
  updateInventoryItem(id: UUID!, input: UpdateInventoryItemInput!): InventoryItem!
  deleteInventoryItem(id: UUID!): Boolean!
  addInventory(input: AddInventoryInput!): InventoryItem!
  removeInventory(input: RemoveInventoryInput!): InventoryItem!
  adjustInventory(input: AdjustInventoryInput!): InventoryItem!

  # FCM Token Management
  saveFCMToken(token: String!, device: String): SaveFCMTokenResult!
  removeFCMToken(token: String!): SaveFCMTokenResult!
  sendPushNotification(userId: UUID!, title: String!, body: String!): SaveFCMTokenResult!
}

type SaveFCMTokenResult {
  success: Boolean!
  message: String!
}

# ============ QR MENU TYPES ============

type TableQR {
  id: UUID!
  tableId: UUID!
  qrToken: String!
  accessUrl: String!
  isActive: Boolean!
  createdAt: String!
}

type CategoryWithProducts {
  id: UUID!
  name: String!
  description: String!
  sortOrder: Int!
  products: [ProductPublic!]!
}

type ProductPublic {
  id: UUID!
  name: String!
  description: String!
  price: Float!
  imageUrl: String
  preparationTime: Int!
  allergens: [String!]!
}

type ClientOrderConfirmation {
  orderId: UUID!
  orderToken: String!
  status: String!
  message: String!
  estimatedReadyTime: Int
}

# ============ QR MENU INPUTS ============

input ClientOrderItemInput {
  productId: UUID!
  quantity: Int!
  notes: String
}

input CreateClientOrderInput {
  qrCodeToken: String!
  customerName: String!
  customerPhone: String
  items: [ClientOrderItemInput!]!
  notes: String
}

# ============ QR MENU QUERIES ============

extend type Query {
  # Get the public menu for a branch (no auth required)
  publicMenu(branchId: UUID!): [CategoryWithProducts!]!
  
  # Get table info from QR token (for the menu page)
  tableByQRToken(token: String!): Table
  
  # Get QR code info by token
  getQRByToken(token: String!): TableQR
}

# ============ QR MENU MUTATIONS ============

extend type Mutation {
  # Generate or retrieve QR code for a table
  generateTableQR(tableId: UUID!): TableQR!
  
  # Create an order from the QR menu (no auth required)
  createClientOrder(input: CreateClientOrderInput!): ClientOrderConfirmation!
}
