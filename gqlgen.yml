# gqlgen configuration
# https://gqlgen.com/reference/configuration/

schema:
  - schema/*.graphql

exec:
  filename: internal/graph/generated.go
  package: graph

model:
  filename: internal/graph/models_gen.go
  package: graph

resolver:
  layout: follow-schema
  dir: internal/graph
  package: graph
  filename_template: "{name}.resolvers.go"

autobind:
  - github.com/greenpos/backend/internal/model

models:
  ID:
    model:
      - github.com/google/uuid.UUID
  UUID:
    model:
      - github.com/google/uuid.UUID
  Tenant:
    model: github.com/greenpos/backend/internal/model.Tenant
  Branch:
    model: github.com/greenpos/backend/internal/model.Branch
  User:
    model: github.com/greenpos/backend/internal/model.User
  UserRole:
    model: github.com/greenpos/backend/internal/model.UserRole
  Category:
    model: github.com/greenpos/backend/internal/model.Category
  Product:
    model: github.com/greenpos/backend/internal/model.Product
  RestaurantTable:
    model: github.com/greenpos/backend/internal/model.RestaurantTable
  TableStatus:
    model: github.com/greenpos/backend/internal/model.TableStatus
  Order:
    model: github.com/greenpos/backend/internal/model.Order
  OrderStatus:
    model: github.com/greenpos/backend/internal/model.OrderStatus
  OrderItem:
    model: github.com/greenpos/backend/internal/model.OrderItem
  Reservation:
    model: github.com/greenpos/backend/internal/model.Reservation
  ReservationStatus:
    model: github.com/greenpos/backend/internal/model.ReservationStatus
  Invoice:
    model: github.com/greenpos/backend/internal/model.Invoice
  InvoiceItem:
    model: github.com/greenpos/backend/internal/model.InvoiceItem
  InvoiceStatus:
    model: github.com/greenpos/backend/internal/model.InvoiceStatus
  TenantFiscal:
    model: github.com/greenpos/backend/internal/model.TenantFiscal
  InventoryItem:
    model: github.com/greenpos/backend/internal/model.InventoryItem
  InventoryMovement:
    model: github.com/greenpos/backend/internal/model.InventoryMovement
  MovementType:
    model: github.com/greenpos/backend/internal/model.InventoryMovementType
  CreateInventoryItemInput:
    model: github.com/greenpos/backend/internal/graph.CreateInventoryItemInput
  UpdateInventoryItemInput:
    model: github.com/greenpos/backend/internal/graph.UpdateInventoryItemInput
  AddInventoryInput:
    model: github.com/greenpos/backend/internal/graph.AddInventoryInput
  RemoveInventoryInput:
    model: github.com/greenpos/backend/internal/graph.RemoveInventoryInput
  AdjustInventoryInput:
    model: github.com/greenpos/backend/internal/graph.AdjustInventoryInput

omit_slice_element_pointers: true
